# DeepSchema for learn skill — validates judgment-based LA-REQ-006 requirements
requirements:
  # LA-REQ-006.8
  sequential-session-processing: >
    The skill MUST process sessions one at a time (sequentially, not in
    parallel) to avoid conflicts when multiple sessions involve the same
    agent.

  # LA-REQ-006.10
  missing-transcript-handling: >
    If a session's transcript cannot be found, the skill MUST skip that
    session and report the issue in the final summary.

  # LA-REQ-003.12
  topics-vs-learnings-distinction: >
    The skill MUST ensure topics document conceptual reference material
    (how things work) and learnings document incident post-mortems of
    specific mistakes (what went wrong).

  # LA-REQ-003.14
  dynamic-guideline-inclusion: >
    Each additional learning guideline file MUST be dynamically included
    via backtick syntax in the corresponding skill's Context section.
    Empty files result in no additional guidance.

  # LA-REQ-003.5
  core-knowledge-content-structure: >
    The skill MUST instruct that core-knowledge.md files follow the
    expected structure: identity statement, domain concepts, key patterns,
    and common pitfalls.
