name: test_job_flow
summary: "Test the DeepWork job creation workflow end-to-end and identify friction points for improvement"

step_arguments:
  - name: job_yml
    description: "The job.yml file created by the sub-agent for the detailed_test_review job"
    type: file_path
  - name: friction_report
    description: "Markdown report describing friction encountered during the nested job-creation run"
    type: file_path
  - name: recommendations
    description: "Markdown report with actionable improvements to reduce job-creation friction"
    type: file_path

workflows:
  run:
    summary: "Create a test job via sub-agent, review the process, and identify improvements"
    common_job_info_provided_to_all_steps_at_runtime: |
      A meta-workflow that tests the DeepWork job creation process itself. This job:

      1. Creates a new job ("detailed_test_review") via a nested sub-agent workflow,
         exercising the full `/deepwork new_job` creation pipeline
      2. Reviews the sub-agent's transcript for completeness and documents any friction
         points encountered during the creation process
      3. Investigates the DeepWork system code to identify improvements that could
         reduce the friction found in step 2

      This is a diagnostic/improvement workflow for the DeepWork framework. The final
      output is a set of actionable recommendations for reducing job creation friction.
    steps:
      - name: create_test_review_job
        instructions: |
          Launch the DeepWork `deepwork_jobs/new_job` workflow as a nested workflow to create a temporary job called `detailed_test_review`. This step should exercise the full job creation pipeline end-to-end without needing user clarification.

          Use a goal that contains all of the following requirements:

          - Job name: `detailed_test_review`
          - Summary: `Run tests with coverage and update README with results`
          - Two steps named `run_tests` and `update_readme`
          - `run_tests` must run the project's tests with coverage enabled
          - `run_tests` must output all executed test files and the coverage report
          - `run_tests` must include review coverage for test relevance and coverage threshold
          - `update_readme` must consume the coverage report and update the README with coverage percentage and an as-of date at the end

          Follow the nested workflow through all of its steps until it completes. When done, return `.deepwork/jobs/detailed_test_review/job.yml` as the `job_yml` output.
        outputs:
          job_yml:
            required: true
            review:
              strategy: matches_together
              instructions: |
                Review the generated job definition.

                Confirm all of the following:
                - It defines exactly two steps named `run_tests` and `update_readme`.
                - `run_tests` produces outputs for the executed test files and the coverage report.
                - `run_tests` includes review coverage for both test relevance and the coverage threshold.
                - `update_readme` consumes the coverage report and produces a README output.

      - name: review_creation_process
        instructions: |
          Review the nested workflow execution from the previous step and write a friction report at `.deepwork/tmp/job_creation_friction.md`.

          The report must:
          - reference concrete events from the nested execution or resulting artifacts
          - note which workflow phases completed cleanly versus requiring retries or workarounds
          - identify friction such as validation failures, confusing instructions, unnecessary retries, or missing guidance
          - describe impact and an initial direction for fixing each friction point

          Also verify that `.deepwork/jobs/detailed_test_review/job.yml` was created as expected, note any deviations from the requested spec, and then delete the temporary `.deepwork/jobs/detailed_test_review/` job directory after the review is complete.
        inputs:
          job_yml:
            required: true
        outputs:
          friction_report:
            required: true
            review:
              strategy: matches_together
              instructions: |
                Review the friction report.

                Confirm all of the following:
                - It references specific events from the nested workflow execution or resulting files.
                - The documented friction points are concrete and actionable.
                - It distinguishes what went smoothly from what created avoidable friction.

      - name: identify_improvements
        instructions: |
          Read the friction report, then investigate the DeepWork instructions and code to identify concrete improvements.

          At minimum:
          - inspect the `deepwork_jobs/new_job` workflow definition and related instructions/templates
          - inspect the code paths in `src/deepwork/` that appear related to the documented friction
          - turn each friction point into one or more implementation recommendations with clear file targets, expected impact, effort, and risk
          - prioritize the recommendations into quick wins versus larger investments

          Write the recommendations report to `.deepwork/tmp/improvement_recommendations.md` and return it as the `recommendations` output.
        inputs:
          friction_report:
            required: true
        outputs:
          recommendations:
            required: true
            review:
              strategy: matches_together
              instructions: |
                Read `friction_report` while reviewing the recommendations.

                Confirm all of the following:
                - Each recommendation clearly addresses a documented friction point.
                - Recommendations are specific enough to implement, including the relevant files or subsystems.
                - Recommendations are technically feasible within the DeepWork architecture.
