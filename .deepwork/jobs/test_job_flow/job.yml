name: test_job_flow
summary: "Test the DeepWork job creation workflow end-to-end and identify friction points for improvement"

step_arguments:
  - name: job_yml
    description: "The job.yml file created by the sub-agent for the detailed_test_review job"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Verify this job.yml defines two steps (run_tests and update_readme) with correct
        data flow. run_tests MUST have both test_files and coverage_report outputs.
        update_readme MUST take coverage_report as input and produce a readme output.
        Reviews MUST be defined: a per-file review on test_files for on-topic tests,
        and a step-level review for coverage threshold on run_tests.

  - name: friction_report
    description: "Report documenting friction points encountered during the sub-agent job creation process, with specific transcript references and actionable observations"
    type: string

  - name: recommendations
    description: "Actionable engineering recommendations for reducing job creation friction, mapped to specific friction points"
    type: string

workflows:
  run:
    summary: "Create a test job via sub-agent, review the process, and identify improvements"
    common_job_info_provided_to_all_steps_at_runtime: |
      A meta-workflow that tests the DeepWork job creation process itself. This job:

      1. Creates a new job ("detailed_test_review") via a nested sub-agent workflow,
         exercising the full `/deepwork new_job` creation pipeline
      2. Reviews the sub-agent's transcript for completeness and documents any friction
         points encountered during the creation process
      3. Investigates the DeepWork system code to identify improvements that could
         reduce the friction found in step 2

      This is a diagnostic/improvement workflow for the DeepWork framework. The final
      output is a set of actionable recommendations for reducing job creation friction.
    steps:
      - name: create_test_review_job
        instructions: |
          # Create Test Review Job via Sub-Agent

          Launch the DeepWork `new_job` workflow as a nested sub-agent to create a job
          called `detailed_test_review`. This exercises the full job creation pipeline end-to-end.

          ## Task

          Start the `deepwork_jobs/new_job` workflow as a nested workflow (using `start_workflow`),
          providing prescriptive instructions so the sub-agent completes without user questions.

          ### Process

          1. **Start the nested workflow**
             Call `start_workflow` with `job_name: deepwork_jobs`, `workflow_name: new_job`,
             `instance_id: detailed_test_review`. Use a goal containing ALL details below.

          2. **Guide through the `define` step** with these specs:

             **Job name**: `detailed_test_review`
             **Summary**: "Run tests with coverage and update README with results"

             **Step 1 - `run_tests`**: Run all tests with coverage. No user inputs.
             - Output `test_files` (type: file_path): all test files executed
             - Output `coverage_report` (type: file_path): the coverage report
             - Review on test_files: check each file's tests are on-topic
             - Process requirement: coverage MUST be above 60%

             **Step 2 - `update_readme`**: Update README with coverage numbers.
             - Input: coverage_report from run_tests
             - Output `readme` (type: file_path): updated README with coverage % and as-of date

          3. **Follow through all nested workflow steps** (define, implement, test, iterate)

          4. **Collect output**: the job.yml at `.deepwork/jobs/detailed_test_review/job.yml`
        outputs:
          job_yml: {}

      - name: review_creation_process
        instructions: |
          # Review Sub-Agent Transcript and Document Friction

          Review the transcript from step 1's sub-agent, verify it completed successfully,
          and document friction points encountered during job creation.

          ## Task

          1. **Review the transcript**: Note each workflow step executed and whether it
             completed on first try or required retries.

          2. **Verify completion**: Confirm `.deepwork/jobs/detailed_test_review/job.yml`
             exists with expected structure (2 steps, correct outputs, reviews, and
             inline step instructions).

          3. **Identify friction points**: Look for errors, workarounds, retries, confusion,
             unnecessary steps, slow paths, and missing guidance in the transcript.

          4. **Clean up**: Delete `.deepwork/jobs/detailed_test_review/` — it was only
             created to exercise the pipeline.

          5. **Compose friction report** as a string output with:
             - Summary of how the process went
             - Completion status per workflow step
             - Each friction point with: step, what happened, impact, workaround, potential fix
             - Things that worked well
             - Overall assessment
        inputs:
          job_yml: {}
        outputs:
          friction_report: {}

      - name: identify_improvements
        instructions: |
          # Investigate Code and Propose Improvements

          Read the friction report, investigate DeepWork system code, and propose concrete
          improvements to reduce job creation friction.

          ## Task

          1. **Review the friction report** (provided as input) and categorize each friction
             point by type (error, UX, missing feature, documentation gap, etc.)

          2. **Investigate the new_job workflow**: Read the workflow definition and step
             instruction files in `src/deepwork/standard_jobs/deepwork_jobs/`

          3. **Investigate system code**: Look at MCP server code in `src/deepwork/`,
             templates, scripts, and tooling. Identify code-level friction causes.

          4. **Develop recommendations**: For each friction point, propose changes with:
             specific file(s), why it helps, effort estimate (Small/Medium/Large), and risk.

          5. **Compose recommendations** as a string output, prioritized by impact-to-effort
             ratio, grouped into quick wins vs larger investments.
        inputs:
          friction_report: {}
        outputs:
          recommendations: {}
        process_requirements:
          addresses_friction: "Each recommendation MUST clearly map to a documented friction point from the friction report."
          actionable: "Recommendations MUST point to specific files and describe concrete changes, not abstract suggestions."
