# yaml-language-server: $schema=.deepwork/schemas/job.schema.json
name: platform_engineer
summary: "Investigate incidents, set up observability, optimize CI/CD, manage releases, and debug platform infrastructure."

step_arguments:
  - name: context.md
    description: "Platform context document listing detected tools, infrastructure type, repo structure, and existing configurations"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Available tools (kubectl, Grafana MCP, CI provider, cloud CLI, Nix) are explicitly listed with version info where available.
        - The infrastructure type (k8s, nix, cloud-managed, hybrid, or none) is clearly stated with supporting evidence.
        - Key directories and configuration files relevant to platform engineering are cataloged.

  - name: incident_description
    description: "Description of the incident — a symptom, alert, or error message"
    type: string

  - name: environment
    description: "Target environment identifier (e.g., production, staging, dev)"
    type: string

  - name: triage.md
    description: "Triage document with incident scope, affected services, and investigation plan"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - The incident is clearly scoped with specific symptoms, timeframe, and affected environment identified.
        - A prioritized list of investigation areas is defined based on symptom analysis.
        - The target environment is explicitly identified and connectivity is confirmed or noted as blocked.

  - name: investigation_findings.md
    description: "Detailed investigation findings with evidence, timeline, and root cause hypotheses"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read triage.md to verify the investigation followed the planned investigation areas. Verify that:
        - At least one root cause hypothesis is proposed and supported by evidence from logs and/or metrics.
        - Each finding includes specific evidence — log lines, metric values, timestamps — not just conclusions.
        - Findings from different sources are cross-referenced to corroborate or rule out hypotheses.
        - Confidence levels accurately reflect verification status per convention 5.

  - name: incident_report.md
    description: "Final incident report with timeline, root cause analysis, and remediation suggestions"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read investigation_findings.md to verify the report accurately reflects the evidence. Verify that:
        - The incident timeline is clear with specific timestamps and ordered chronologically.
        - Root cause analysis is supported by evidence from the investigation, not speculation.
        - Remediation suggestions include specific commands or actions with risk levels and rollback steps.
        - The report format matches the severity — concise summary for minor issues, full report for significant incidents.

  - name: symptom
    description: "What is broken — error message, failing command, or description of the problem"
    type: string

  - name: diagnostic_report.md
    description: "Diagnostic report with findings, attempted fixes, and resolution status"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - The root cause of the dev environment issue is identified or clearly stated as unknown.
        - Safe fixes were attempted with their outcomes documented.
        - The developer is either unblocked with a working fix or a GitHub issue was created to track the blocker.

  - name: error_tracking_config.md
    description: "Documentation of error tracking setup: provider, DSN, SDK integration, source maps"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - An error tracking provider is selected with rationale for the choice.
        - SDK integration is configured with DSN, environment tags, and release tracking.
        - A test event was sent or verification steps are documented.
        - Configuration details are documented in the repository per convention 54.

  - name: target_service
    description: "Service or organization to inspect dashboards for"
    type: string

  - name: dashboard_assessment.md
    description: "Assessment of existing dashboards with coverage gaps and recommendations"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All existing dashboards for the target service/org are listed with their purpose.
        - Coverage of the four golden signals (latency, traffic, errors, saturation) is assessed per convention 7.
        - Missing dashboards or uncovered signals are clearly identified with recommendations.

  - name: dashboard_definition
    description: "Grafana dashboard JSON definitions or provisioning configs"
    type: file_path
    review:
      strategy: individual
      instructions: |
        Read dashboard_assessment.md to verify the new dashboards address identified gaps. Verify that:
        - The dashboard includes panels for latency, traffic, errors, and saturation per convention 7.
        - Dashboard has time range selectors defaulting to last 1 hour per convention 8.
        - Dashboard panels provide actionable information, not just raw data.

  - name: cicd_audit.md
    description: "CI/CD audit report with pipeline analysis, bottlenecks, and metrics"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All CI/CD pipeline configurations are identified and analyzed.
        - Build times, cache hit rates, and parallelism levels are documented where available.
        - Performance bottlenecks and inefficiencies are flagged with evidence.
        - Pipelines are checked against CI/CD conventions 18-23.

  - name: optimization_plan.md
    description: "Prioritized CI/CD optimization plan with expected impact"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read cicd_audit.md to verify recommendations address the identified bottlenecks. Verify that:
        - Each recommendation includes specific changes to make, not just general advice.
        - Expected impact on build time and/or cost is estimated for each recommendation.
        - Recommendations are ordered by impact-to-effort ratio.

  - name: release_audit.md
    description: "Audit of existing release process with gaps identified against conventions 24-29"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - The existing release process (or lack thereof) is fully documented.
        - Missing components are identified by checking against release management conventions 24-29.
        - Current versioning scheme is documented and assessed for SemVer compliance.

  - name: release_configs
    description: "CI workflow files, release scripts, and branch protection configs"
    type: file_path

  - name: release_docs.md
    description: "Documentation of release process decisions and setup"
    type: file_path

  - name: infrastructure_audit.md
    description: "Infrastructure audit documenting setup, gaps, and convention compliance"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All infrastructure components (monitoring, CI/CD, deployment, secrets, networking) are documented.
        - Each component is checked against relevant conventions with pass/fail status.
        - Identified gaps include specific recommendations for remediation.

  - name: spend_analysis.md
    description: "Cloud spend analysis with waste identification and savings recommendations"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Current cloud costs are documented with breakdown by service/resource type.
        - Idle, oversized, or unused resources are flagged per conventions 35-38.
        - Potential savings are estimated for each recommendation.
        - Costs are categorized as fixed or variable per convention 39.

  - name: vulnerability_report.md
    description: "Vulnerability report with severity assessments and prioritized remediation plan"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Vulnerability scans were run or existing scan results were reviewed.
        - Each vulnerability has a severity assessment (Critical/High/Medium/Low).
        - Remediation actions are prioritized by severity and exploitability.
        - Scan frequency and response timelines are checked against conventions 30-34.

  - name: observability_plan.md
    description: "Observability setup plan with stack selection, architecture, and implementation steps"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - A monitoring stack is selected with rationale based on the infrastructure type from context.md.
        - The monitoring architecture is defined including data flow, retention, and alerting.
        - Clear implementation steps are provided appropriate to the infrastructure type (k8s operator, nix module, or cloud-managed).
        - The plan ensures all production services will have golden signal coverage per convention 7.

  - name: observability_configs
    description: "Monitoring configuration files (Helm values, nix modules, cloud configs, alert rules)"
    type: file_path

  - name: migration_description
    description: "What is being migrated (e.g., 'migrate from Zalando Postgres operator to CNPG')"
    type: string

  - name: migration_plan.md
    description: "Detailed migration plan with steps, validation gates, and rollback procedures"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - The current infrastructure state is fully documented.
        - A rollback plan is documented before any migration steps per convention 40.
        - Each migration step has a validation gate per convention 44.
        - A GitHub issue with detailed checklist is created per convention 41.
        - Risks are identified and mitigations are documented.

  - name: github_issue_url.md
    description: "URL of the created GitHub issue"
    type: file_path

  - name: migration_report.md
    description: "Migration execution report with completed steps, validation results, and final state"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read migration_plan.md to verify all planned steps were executed with their validation gates. Verify that:
        - All migration steps from the plan are accounted for with pass/fail status.
        - Each validation gate result is documented.
        - Migration progress is tracked in the GitHub issue per convention 45.
        - The post-migration state is verified and documented.

  - name: controls_assessment.md
    description: "Inventory of existing controls mapped to SOC 2 TSC criteria with evidence references"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Controls are assessed across all five Trust Service Criteria: Security (CC), Availability, Processing Integrity, Confidentiality, and Privacy.
        - Each implemented control references where the evidence can be found (file path, CI workflow, config, policy) per convention 65.
        - Every control is classified as implemented, partial, or missing per convention 64.
        - Automated controls are verified by checking actual infrastructure configuration, not just documentation per convention 68.

  - name: gap_analysis.md
    description: "Gap analysis with missing and partial controls, remediation recommendations, and prioritization"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read controls_assessment.md to verify gaps are derived from the actual assessment, not generic checklists. Verify that:
        - Each gap references the specific TSC criteria it violates (e.g., CC6.1, A1.2) per convention 69.
        - Each gap includes a remediation recommendation with estimated effort and priority per convention 70.
        - Gaps are prioritized by audit risk — controls that auditors always check are flagged as high priority.

  - name: evidence_checklist.md
    description: "Evidence collection checklist for controls requiring manual evidence"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All controls requiring manual evidence are listed with responsible party and collection cadence per convention 66.
        - Controls that can be verified automatically are not in the manual checklist.

  - name: compliance_doc.md
    description: "The SOC 2 compliance document to be committed to the repository per convention 60"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Read controls_assessment.md and gap_analysis.md to verify the compliance document accurately reflects the assessment. Verify that:
        - The document records controls and evidence without referencing any specific compliance platform per convention 61.
        - The document is structured for version control — changes to controls will produce meaningful diffs per convention 62.
        - Each control is mapped to the specific TSC criteria it satisfies per convention 69.
        - Evidence references point to actual locations (file paths, URLs, CI workflows) that an auditor or compliance platform can verify.

  - name: readiness_summary.md
    description: "Executive summary of SOC 2 readiness with overall score and top action items"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - An overall readiness assessment is provided (ready, nearly ready, significant gaps).
        - The top 5-10 gaps are listed with their remediation priority.
        - If a remediation timeline is suggested, it is realistic given the estimated effort.

  - name: issue_description
    description: "Description of the platform engineering issue to create"
    type: string

workflows:
  incident_investigation:
    summary: "Full incident investigation from triage to report"
    common_job_info_provided_to_all_steps_at_runtime: |
      Platform engineering job for discovering gaps, setting up infrastructure, and maintaining
      production systems. Technology-agnostic — adapts to Kubernetes, Nix, cloud-managed, or hybrid
      environments based on what `gather_context` discovers.

      ## Core Philosophy
      - Discover what exists before proposing changes
      - Help users pick the right choices for their context
      - Document all decisions in the repository
      - Never take destructive actions without explicit approval

      ## Conventions
      All workflows follow the RFC 2119 conventions defined in `conventions.md` (in the job directory).
      Step instructions reference specific convention numbers. Key areas:
      - Investigation principles (conventions 1-6)
      - Observability standards (conventions 7-12)
      - Infrastructure standards (conventions 13-17)
      - CI/CD standards (conventions 18-23)
      - Release management (conventions 24-29)
      - Security standards (conventions 30-34)
      - Cloud cost standards (conventions 35-39)
      - Migration standards (conventions 40-45)
      - Developer environment (conventions 46-49)
      - Error tracking (conventions 50-54)
      - Grafana MCP usage (conventions 55-59)
      - SOC 2 compliance (conventions 60-70)

      ## Tool Detection
      The `gather_context` step detects available tools and infrastructure type. All subsequent
      steps read `context.md` to adapt behavior.

      ## Artifact Storage
      Workflow artifacts go in `.deepwork/artifacts/platform_engineer/<workflow>/<date-slug>/`.
    steps:
      - name: gather_context
        instructions: |
          # Gather Platform Context

          ## Objective

          Auto-detect the available tools, infrastructure type, repository structure, and existing configurations so that all subsequent workflow steps can adapt their behavior to the actual environment. This step MUST NOT require user input — it discovers everything automatically.

          ## Task

          Probe the local machine and repository to build a comprehensive platform context document. The output informs every other step in every workflow (12 workflows depend on this step), so thoroughness matters more than speed — but avoid blocking operations (no network calls that could hang without a timeout).

          ### Process

          #### 1. Detect Available Tools

          For each tool category, check whether the binary exists and capture its version. Record each tool as **available** or **not found**.

          **Container orchestration:**
          - `kubectl version --client -o json 2>/dev/null` — record client version
          - `helm version --short 2>/dev/null`
          - `k9s version --short 2>/dev/null`
          - `docker --version 2>/dev/null` or `podman --version 2>/dev/null`
          - `docker compose version 2>/dev/null` or `podman-compose --version 2>/dev/null`

          **Observability:**
          - Grafana MCP — attempt to list dashboards via the Grafana MCP tool. If the tool responds, record as available and note the Grafana instance URL if returned. If the tool is not available or errors, record as not found.
          - `promtool --version 2>/dev/null` (Prometheus CLI)
          - `logcli --version 2>/dev/null` (Loki CLI)
          - `amtool --version 2>/dev/null` (AlertManager CLI)

          **CI provider (detect from repo files, not CLIs):**
          - Check for `.github/workflows/` directory — if present, record GitHub Actions
          - Check for `.forgejo/workflows/` directory — if present, record Forgejo Actions
          - Check for `.gitlab-ci.yml` — if present, record GitLab CI
          - Check for `.circleci/` directory — if present, record CircleCI
          - Check for `Jenkinsfile` — if present, record Jenkins
          - `gh --version 2>/dev/null` (GitHub CLI)

          **Cloud CLIs:**
          - `aws --version 2>/dev/null`
          - `gcloud --version 2>/dev/null` (first line only)
          - `az --version 2>/dev/null` (first line only)
          - `doctl version 2>/dev/null`
          - `terraform --version 2>/dev/null` (first line only)
          - `pulumi version 2>/dev/null`
          - `kubectl config get-contexts 2>/dev/null` — note the current context name

          **Nix ecosystem:**
          - `nix --version 2>/dev/null`
          - `nixos-rebuild --help 2>/dev/null` (check exit code only, suppress output)
          - `home-manager --version 2>/dev/null`
          - Check if `flake.nix` exists at repo root
          - Check if `flake.lock` exists at repo root

          **Error tracking:**
          - `sentry-cli --version 2>/dev/null`
          - `honeybadger --version 2>/dev/null`

          **Package managers & build tools:**
          - `nix develop --help 2>/dev/null` (check exit code only)
          - `npm --version 2>/dev/null`
          - `pnpm --version 2>/dev/null`
          - `yarn --version 2>/dev/null`
          - `cargo --version 2>/dev/null`
          - `go version 2>/dev/null`
          - `uv --version 2>/dev/null`
          - `pip --version 2>/dev/null`

          #### 2. Determine Infrastructure Type

          Based on tool detection results and repo contents, classify the infrastructure type. Exactly one primary type MUST be assigned, with optional secondary types.

          | Type | Evidence |
          |------|----------|
          | **kubernetes** | `kubectl` available AND a kubeconfig exists (`~/.kube/config` or `$KUBECONFIG`) AND cluster is reachable (`kubectl cluster-info 2>/dev/null` exits 0) |
          | **nix** | `flake.nix` exists at repo root OR NixOS configuration files are present |
          | **cloud-managed** | Cloud CLI available AND no k8s/nix evidence (e.g., pure AWS Lambda, GCP Cloud Run) |
          | **hybrid** | More than one of the above applies |
          | **none** | None of the above applies — likely a local-only or new project |

          If `kubectl` is available but cluster is not reachable, note this as "kubernetes (disconnected)" — the tool exists but cannot query live state.

          #### 3. Survey Repository Structure

          Scan the repository for platform-relevant files and directories. Do NOT read file contents — just note existence and paths.

          #### 4. Catalog Existing Configurations

          Note existing monitoring and operational configurations without reading sensitive content.

          ## Output Format

          Write the context document to `.deepwork/artifacts/platform_engineer/context.md`. Use the tabular format described in the step instructions file with sections for Available Tools, Infrastructure Type, Repository Structure, and Existing Configurations.
        outputs:
          context.md: {}

      - name: triage
        instructions: |
          # Triage & Scope

          ## Objective

          Parse the incident description, determine the target environment, verify connectivity, identify likely affected services, and produce a prioritized investigation plan. This step transforms a vague symptom report into a structured, actionable scope for investigation.

          ## Task

          Take the incident description and environment inputs, validate them, confirm access to the target environment, and create a triage document that will guide the investigate step.

          ### Process

          1. Parse the incident description — extract symptom, onset, scope, severity, recent changes. If vague, ask structured clarifying questions.
          2. Determine target environment from the environment input. If ambiguous, present discovered environments from context.md and ask user to confirm.
          3. Verify connectivity to the target environment based on infrastructure type from context.md. If connectivity fails, note failure and suggest remediation.
          4. Identify likely affected services by mapping symptoms to service categories and correlating with repo structure from context.md. Generate hypotheses ordered by likelihood.
          5. Detect available investigation tools by cross-referencing context.md tools with what is useful for this incident.
          6. Create a prioritized investigation plan. Each area MUST specify: what to check, which tool to use, what positive/negative findings mean, and estimated effort.
          7. Create the incident artifact directory at `.deepwork/artifacts/platform_engineer/incident_investigation/YYYY-MM-DD-<slug>/` and write triage.md there.

          Per convention 1, no destructive actions during triage. Per convention 3, all findings include timestamps and confidence levels.
        inputs:
          incident_description: {}
          environment: {}
          context.md: {}
        outputs:
          triage.md: {}

      - name: investigate
        instructions: |
          # Deep Investigation

          ## Objective

          Execute the investigation plan from the triage step by querying logs, metrics, events, and service state to build an evidence-based understanding of the incident. Correlate findings across sources and produce root cause hypotheses with calibrated confidence levels.

          ## Task

          Systematically work through each priority area from the triage document, using the tools identified in context.md. Record all findings — including negative results (per convention 6) — and correlate evidence across sources to build root cause hypotheses.

          ### Process

          1. Review triage plan and adapt — confirm priorities are still valid, verify environment connectivity.
          2. Kubernetes investigation (if kubectl available) — cluster health, pod status, logs, deployments, networking.
          3. Grafana MCP investigation (if available) — check active alerts, dashboard queries for golden signals, Loki log queries per conventions 55-59.
          4. Cloud CLI investigation (if available) — recent deployments, service health, resource utilization.
          5. CI/CD correlation — check for recent deployments correlating with incident onset.
          6. Error tracking correlation (if available) — error spikes matching incident timeframe.
          7. Service-specific deep checks — database, application, networking, queue checks as relevant.
          8. Correlate findings — build timeline, cross-reference sources, identify patterns, check for cascading failures. Per convention 4, cross-referencing MUST be performed before assigning high confidence.
          9. Build root cause hypotheses — each with description, supporting evidence, contradicting evidence, confidence level per convention 5, and verification steps.
          10. Document unresolved questions — tools unavailable, data inaccessible, hypotheses needing verification.

          Per conventions 1 and 2, this step is strictly read-only. No remediation actions during investigation.
        inputs:
          triage.md: {}
          context.md: {}
        outputs:
          investigation_findings.md: {}

      - name: incident_report
        instructions: |
          # Incident Report

          ## Objective

          Synthesize the triage scope and investigation findings into a structured incident report with timeline, root cause analysis, impact assessment, and remediation suggestions. The report format scales with incident severity.

          ## Task

          Read the triage document and investigation findings, determine the appropriate report format (Quick Summary for minor issues, Full Report for significant incidents), and produce a report that is accurate, evidence-backed, and actionable. Remediation commands are suggested but NEVER executed.

          ### Process

          1. Determine report format — Quick Summary (1-2 pages) for straightforward issues with clear root cause, Full Report (comprehensive) for significant user impact or complex root causes.
          2. Build the timeline — construct precise chronological timeline from all evidence, distinguishing known facts from inferred events.
          3. Synthesize root cause analysis — primary root cause, contributing factors, trigger vs. underlying cause. Every claim MUST reference specific evidence.
          4. Assess impact — duration, scope, user impact, data impact, business impact.
          5. Formulate remediation suggestions — each with description, specific commands, risk level (Safe/Moderate/High risk), rollback steps, and verification. Group into Immediate, Short-term, and Long-term/Prevention. Per conventions 1 and 2, NEVER execute remediation commands.
          6. Write prevention recommendations (Full Report only) — monitoring gaps, process gaps, architecture gaps, testing gaps.

          Write the report to the incident artifact directory alongside triage.md and investigation_findings.md.
        inputs:
          triage.md: {}
          investigation_findings.md: {}
        outputs:
          incident_report.md: {}

  quick_investigate:
    summary: "Rapid incident triage without formal report"
    common_job_info_provided_to_all_steps_at_runtime: |
      Platform engineering job for discovering gaps, setting up infrastructure, and maintaining
      production systems. Technology-agnostic — adapts to Kubernetes, Nix, cloud-managed, or hybrid
      environments based on what `gather_context` discovers.

      ## Core Philosophy
      - Discover what exists before proposing changes
      - Help users pick the right choices for their context
      - Document all decisions in the repository
      - Never take destructive actions without explicit approval

      ## Conventions
      All workflows follow the RFC 2119 conventions defined in `conventions.md` (in the job directory).

      ## Artifact Storage
      Workflow artifacts go in `.deepwork/artifacts/platform_engineer/<workflow>/<date-slug>/`.
    steps:
      - name: gather_context
        instructions: |
          # Gather Platform Context

          Auto-detect available tools, infrastructure type, and repo structure. See the incident_investigation workflow's gather_context step for the full process. Write context document to `.deepwork/artifacts/platform_engineer/context.md`.
        outputs:
          context.md: {}

      - name: triage
        instructions: |
          # Triage & Scope

          Parse the incident description, verify connectivity, identify affected services, and create a prioritized investigation plan. See the incident_investigation workflow's triage step for the full process.
        inputs:
          incident_description: {}
          environment: {}
          context.md: {}
        outputs:
          triage.md: {}

      - name: investigate
        instructions: |
          # Deep Investigation

          Execute the investigation plan from triage by querying logs, metrics, events, and service state. Correlate findings and produce root cause hypotheses. See the incident_investigation workflow's investigate step for the full process.
        inputs:
          triage.md: {}
          context.md: {}
        outputs:
          investigation_findings.md: {}

  doctor:
    summary: "Debug local dev environment issues and unblock developer"
    common_job_info_provided_to_all_steps_at_runtime: |
      Platform engineering job for discovering gaps, setting up infrastructure, and maintaining
      production systems. Technology-agnostic — adapts to Kubernetes, Nix, cloud-managed, or hybrid
      environments based on what `gather_context` discovers.

      ## Core Philosophy
      - Discover what exists before proposing changes
      - Help users pick the right choices for their context
      - Document all decisions in the repository
      - Never take destructive actions without explicit approval

      ## Conventions
      All workflows follow the RFC 2119 conventions defined in `conventions.md` (in the job directory).

      ## Artifact Storage
      Workflow artifacts go in `.deepwork/artifacts/platform_engineer/<workflow>/<date-slug>/`.
    steps:
      - name: gather_context
        instructions: |
          # Gather Platform Context

          Auto-detect available tools, infrastructure type, and repo structure. Write context document to `.deepwork/artifacts/platform_engineer/context.md`.
        outputs:
          context.md: {}

      - name: diagnose_dev
        instructions: |
          # Diagnose Dev Environment

          ## Objective

          Debug a local development environment issue by systematically checking common failure modes, attempting safe fixes, and either resolving the problem or creating a GitHub issue with full diagnostic context.

          ## Task

          Read context.md, understand the symptom, check common failure modes for the detected tech stack, attempt safe remediations, and verify the fix. If unresolved, create a GitHub issue.

          ### Process

          1. Read context.md to understand the project's tech stack and tooling.
          2. Ask the user about the symptom — what command fails, exact error message, when it last worked.
          3. Check common failure modes based on detected stack:
             - **Nix/direnv**: direnv allow, flake.lock staleness, dev shell evaluation, store corruption, PATH tools
             - **Docker/containers**: stale containers, port conflicts, volume permissions, network, compose health, disk usage
             - **Database**: connectivity, migration drift, test database, running status
             - **Dependencies**: lockfile conflicts, install command, missing native deps, version mismatches
             - **Environment variables**: .env existence, diff against .env.example, required vars set (no secret values)
             - **Build artifacts/caches**: stale caches, disk space, build tool versions
          4. For each issue found, attempt safe fixes (direnv allow, container restart, dependency install, cache clear, etc.). MUST NOT: delete data, force-push git, modify production config, use sudo without approval, install globally.
          5. Verify fix by re-running the failing command. If still failing, check if error changed.
          6. If unresolved, create a GitHub issue via `gh issue create` with title `[dev-env] <symptom>`, labels `bug, dev-environment`, and body including symptom, environment, checks performed, fixes attempted, and suspected cause.
        inputs:
          symptom: {}
          context.md: {}
        outputs:
          diagnostic_report.md: {}

  error_tracking:
    summary: "Set up exception monitoring (Sentry, Honeybadger, etc.)"
    common_job_info_provided_to_all_steps_at_runtime: |
      Platform engineering job. Technology-agnostic — adapts based on what `gather_context` discovers.
      All workflows follow RFC 2119 conventions in `conventions.md`.
      Artifacts go in `.deepwork/artifacts/platform_engineer/<workflow>/<date-slug>/`.
    steps:
      - name: gather_context
        instructions: |
