  platform_issue:
    summary: "Create a platform engineering GitHub issue from current context"
    steps:
      - name: create_issue
        instructions: |
          # Create Platform Issue

          ## Objective

          Create a well-structured GitHub issue for a platform engineering concern, automatically gathering relevant context.

          ## Task

          Gather issue description, collect environmental and repository context, format using the platform issue template, create via `gh issue create`, and output the issue URL.

          ### Process

          1. Ask user for issue description via AskUserQuestion if input is terse. Prompt for: problem/request, impact, error messages.
          2. Gather context automatically:
             - Repo info: name, current branch, default branch, recent commits, uncommitted changes
             - CI/CD status: recent runs on current branch
             - Related files: verify mentioned files exist, note relevant config files
             - Related issues: `gh issue list --search "<keywords>" --limit 5`
             - Environment: OS, shell, relevant tool versions
          3. Determine metadata:
             - Title: `[area] concise description` (under 80 chars)
             - Labels: `platform` + severity (P1-P4) + type (bug, enhancement, security, etc.). Check label existence via `gh label list`.
          4. Format issue body with sections: Context, Problem/Request, Impact, Relevant Files, References, Checklist (3-7 actionable items).
          5. Create issue via `gh issue create`. If label application fails, retry without non-existent labels.
          6. Write issue URL to github_issue_url.md.

          No sensitive data (secrets, tokens, .env contents) in the issue body.
        inputs:
          issue_description: {}
        outputs:
          github_issue_url.md: {}
        process_requirements:
          issue_created: "A GitHub issue MUST be created successfully via gh issue create."
          properly_formatted: "The issue MUST follow the platform issue template with Context, Problem/Request, Impact, Relevant Files, References, and Checklist sections."
          labels_applied: "Appropriate labels MUST be applied (platform at minimum)."
