          Determine appropriate scanners, execute scans, analyze results, check convention compliance (30-34), and produce a vulnerability report.

          ### Process

          1. Read context.md for languages, package managers, container usage, scanning tools, CI provider, dependency automation.
          2. Check for existing vulnerability management — Dependabot/Renovate config, CI security scanning, GitHub Security Alerts, SECURITY.md.
          3. Run vulnerability scans for each applicable ecosystem — npm/pnpm/yarn audit, pip-audit, cargo audit, govulncheck, bundler-audit, trivy/grype for container images, trivy fs for filesystem.
