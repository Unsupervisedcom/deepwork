          5. Check against security conventions 30-34 — scan frequency, response timeframes, base image currency, automated updates, triage process.
          6. Prioritize remediation in four tiers:
             - Tier 1 Immediate: Critical/High + exploitable + fix available
             - Tier 2 Soon: Critical/High with fix but low exploitability, or Medium with high exploitability
