      - name: assess_controls
        instructions: |
          # Assess Controls

          ## Objective

          Auto-discover existing controls across all five SOC 2 Trust Service Criteria from code, CI, infrastructure, and documentation.

          ## Task

          Systematically examine the project to identify which SOC 2 controls are in place, partially implemented, or missing. Assessment MUST be based on actual configuration and code, not just documentation claims.

          ### Process

          1. Read context.md for infrastructure type, tools, CI provider, repo structure.
          2. Assess Security Controls (CC1-CC9) — control environment, communication, risk assessment, monitoring, control activities, access controls, system operations, change management, risk mitigation.
          3. Assess Availability Controls (A1) — uptime monitoring, SLA docs, auto-scaling, load balancing, redundancy, DR plans.
          4. Assess Processing Integrity Controls (PI1) — input validation, data constraints, testing, idempotency, error handling.
          5. Assess Confidentiality Controls (C1) — data classification, encryption at rest/in transit, access control, retention policies, .gitignore patterns.
          6. Assess Privacy Controls (P1) — privacy policy, consent management, PII handling, DSAR procedures, breach notification.
          7. Classify each control as implemented/partial/missing per convention 64. For automated controls, verify actual config per convention 68.
        inputs:
          context.md: {}
        outputs:
          controls_assessment.md: {}

      - name: gap_analysis
        instructions: |
          # Gap Analysis

          ## Objective

          Compare discovered controls against SOC 2 requirements, identify gaps, and produce an evidence collection checklist.

          ## Task

          Using the controls assessment, identify what is missing or incomplete for SOC 2 readiness. Produce a gap analysis with remediation plan and an evidence checklist for manual items.

          ### Process

          1. Review controls_assessment.md and context.md.
          2. Identify gaps by TSC — high-priority (access controls, change management, monitoring, encryption, vulnerability management, backups, logging), medium-priority (retention, vendor management, capacity, privacy), lower-priority (physical security, HR controls).
          3. Map each gap to specific TSC criteria (e.g., CC6.1, A1.2) per convention 69.
          4. Produce remediation recommendations per convention 70 — what is missing, why it matters, specific remediation steps, estimated effort, priority (P1/P2/P3).
          5. Generate evidence collection checklist — separate automated evidence (already in assessment) from manual evidence (HR records, pen tests, training, BCP tests, vendor assessments). Per convention 66, list each with responsible party and collection cadence.
          6. Assess overall readiness — Ready, Nearly Ready, Significant Gaps, or Major Work Needed.
        inputs:
          controls_assessment.md: {}
          context.md: {}
        outputs:
          gap_analysis.md: {}
          evidence_checklist.md: {}

      - name: readiness_report
        instructions: |
          # Readiness Report

          ## Objective

          Produce the SOC 2 compliance document for the repository and an executive readiness summary.

          ## Task

          Synthesize the controls assessment and gap analysis into a compliance document (platform-agnostic, version-controlled, TSC-mapped) and a concise readiness summary for leadership.

          ### Process

          1. Review controls_assessment.md, gap_analysis.md, and evidence_checklist.md.
          2. Create the compliance document at `docs/compliance/soc2.md` (or as agreed with user). Structure: Overview, Scope, Controls Matrix (per TSC with status and evidence references), Evidence Locations, Manual Evidence Tracking, Known Gaps, Maintenance guidance.
             - Platform-agnostic per convention 61 — no compliance platform references
             - Version-controlled per convention 62 — meaningful git diffs
             - TSC-mapped per convention 69
             - Evidence-linked per convention 65
          3. Create executive readiness summary — overall assessment, readiness score by TSC, top action items, estimated timeline, strengths, risks, next steps.
