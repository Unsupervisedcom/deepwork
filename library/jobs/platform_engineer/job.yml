        instructions: |
          # Analyze Cloud Spend

          ## Objective

          Analyze cloud infrastructure costs, identify waste and optimization opportunities, and produce prioritized recommendations with estimated savings.

          ## Task

          Gather cost data from available cloud providers, break down by service and environment, identify idle or oversized resources, and produce actionable savings recommendations.

          ### Process

          1. Read context.md for cloud CLIs, provider, Kubernetes involvement, IaC tools. If no cloud CLI detected, ask user how to provide cost data.
          2. Gather cost data using appropriate cloud CLI commands (AWS CE, GCP billing, Azure consumption, DigitalOcean invoices). For Kubernetes, also gather node/pod resource usage.
          3. Break down costs by service type (compute, storage, networking, database, other), by environment (prod, staging, dev), and by cost type (fixed vs. variable per convention 39).
          4. Identify waste:
             - Idle resources (convention 35) — unused LBs, detached volumes, stopped instances, unused IPs, old snapshots, unused NAT gateways
             - Oversized resources (convention 36) — low CPU/memory utilization, over-provisioned databases, over-provisioned k8s node pools
             - Unused storage — old container images, CI artifacts, unused buckets, excess snapshots
             - Dev/staging running 24/7 (convention 38) — estimate savings from scheduling
          5. Estimate savings for each finding — immediate (delete idle), near-term (right-size), strategic (reserved instances).
          6. Produce prioritized recommendations grouped as quick wins, right-sizing, scheduling, and architectural changes. Each with specific actions, savings estimate, risk level, and rollback plan.
        inputs:
          context.md: {}
        outputs:
          spend_analysis.md: {}

