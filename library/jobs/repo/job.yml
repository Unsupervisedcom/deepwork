# yaml-language-server: $schema=.deepwork/schemas/job.schema.json
name: repo
summary: "Ensure a repository follows team conventions: labels, boards, branch protection, milestones"

step_arguments:
  - name: project_repo
    description: "Repository â€” a remote URL, an owner/repo slug, or omit to detect from current directory's git remote."
    type: string

  - name: platform_context.md
    description: "Provider, repo, transport, default branch, auth status, existing labels, milestones, and boards"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - The git provider is correctly identified from the remote URL.
        - CLI authentication has been verified for the detected provider.
        - The default branch name is recorded.
        - Existing labels, milestones, and boards (if applicable) are listed.

  - name: labels_report.md
    description: "List of labels checked, created, or already present"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All three required labels (product, engineering, plan) are accounted for.
        - Any missing labels were created with appropriate colors and descriptions.

  - name: branch_protection_report.md
    description: "Current branch protection status and any missing protections"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Branch protection rules on the default branch have been inspected.
        - Any missing or insufficient protections are documented.

  - name: milestones_report.md
    description: "Milestone consistency findings: missing consolidated issues, label mismatches"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Every open milestone was inspected.
        - Each milestone's issues are listed with state and label correctness.

  - name: boards_report.md
    description: "Board existence and item count verification per milestone"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Each milestone was checked for a corresponding board.
        - Board item counts are compared against milestone issue counts.
        - If the provider lacks a board API, manual instructions are provided.

  - name: setup_report.md
    description: "Pass/fail readiness report covering labels, branch protection, milestones, and boards"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Report covers labels, branch protection, milestones, and boards.
        - Each concern has a clear pass or fail status with details.

  - name: labels_audit.md
    description: "Label audit findings: missing, duplicates, unused labels, and fixes applied"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All three required labels (product, engineering, plan) are verified.
        - Case-insensitive duplicate labels are identified.
        - Labels with zero issues are flagged.

  - name: branch_protection_audit.md
    description: "Branch protection audit with findings and fixes attempted"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - All branch protection rules on the default branch have been inspected.
        - Missing protections were attempted to be enabled via API.
        - Any gaps that could not be fixed automatically are documented.

  - name: milestones_audit.md
    description: "Milestone audit findings: inconsistencies found and fixes applied"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Every open milestone was deeply inspected.
        - Issues with incorrect or missing labels were corrected.
        - Milestone-issue relationships are consistent.

  - name: boards_audit.md
    description: "Board audit findings, fixes applied, and remaining issues"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Every milestone's board was inspected.
        - Issues missing from boards were added.
        - Wrong statuses were corrected based on issue/PR state.
        - Board items not belonging to the milestone are flagged.
        - If the provider lacks a board API, manual instructions are provided.

  - name: doctor_report.md
    description: "Summary of findings, fixes applied, and remaining issues across all concerns"
    type: file_path
    review:
      strategy: matches_together
      instructions: |
        Verify that:
        - Report covers labels, branch protection, milestones, and boards.
        - All audit findings are summarized with counts.
        - All fix actions taken are listed.
        - Any issues that still need manual attention are documented.

workflows:
  setup:
    summary: "Make a repo ready for work: labels, branch protection, milestones, boards"
    common_job_info_provided_to_all_steps_at_runtime: |
      This job audits and configures repositories to follow team conventions. It supports two workflows:
      `setup` (make a repo ready for work) and `doctor` (audit existing state and fix drift).

      ## Provider Detection

      The git provider is detected from the repository's remote origin URL:
      - `github.com` â†’ GitHub
      - Self-hosted domains â†’ Forgejo, Gitea, GitLab, etc.

      The agent's tool conventions (loaded via system prompt) document CLI usage for each provider.
      Step instructions describe *what* to check â€” the agent already knows *how* to invoke each
      provider's CLI.

      ## Standard Labels

      Every repo must have these labels:
      - `product` â€” product/UX scope
      - `engineering` â€” technical scope
      - `plan` â€” planning/coordination

      ## Standard Board Columns

      Project boards use these five status columns:
      - Backlog, To Do, In Progress, In Review, Done

      ## Board Lifecycle

      - One project board MUST exist per milestone.
      - The board MUST be created as part of the milestone setup process; the `setup`
        workflow only checks/reports on board existence and MUST NOT create boards automatically.
      - The board MUST be closed or archived when the milestone is closed; the `setup`
        workflow MAY report drift but MUST NOT close or archive boards automatically.

      ## Board Transition Rules

      | Event                          | Expected Column Change |
      |--------------------------------|------------------------|
      | Issue added to milestone       | â†’ Backlog              |
      | Issue prioritized for work     | Backlog â†’ To Do        |
      | Branch created, work starts    | To Do â†’ In Progress    |
      | PR marked ready for review     | In Progress â†’ In Review|
      | PR merged / issue closed       | â†’ Done                 |

      If the platform supports built-in board automations (e.g. GitHub's auto-close â†’ Done,
      PR merged â†’ Done), agents MUST NOT duplicate those automatic transitions.

      ## Branch Protection Expectations

      The default branch should have these protections:
      1. Require PR reviews (at least 1 approval)
      2. Dismiss stale reviews on new commits
      3. Require status checks to pass (if CI is configured)
      4. Restrict force pushes
      5. Restrict branch deletion
    steps:
      - name: detect_platform
        instructions: |
          # Detect Platform

          ## Objective

          Identify the git provider, verify CLI authentication, determine the default branch, and inventory existing labels, milestones, and boards.

          ## Task

          ### Process

          1. **Determine the repository and provider**

             Handle three modes based on the `project_repo` input:

             a. **Omitted / empty** â€” detect from the current directory:
                - Run `git remote get-url origin` to get the remote URL
                - Parse the URL to extract the host and owner/repo slug

             b. **Remote URL provided** (SSH or HTTPS):
                - Parse the URL directly to extract host and owner/repo slug

             c. **Owner/repo slug provided** (e.g. `acme/widgets`):
                - Check for a known provider host in `.git` remote, or ask the user which provider to use

             **Provider detection from hostname:**
             - `github.com` â†’ GitHub
             - `gitlab.com` â†’ GitLab
             - Any other host â†’ assume Forgejo/Gitea (the agent's tool conventions document CLI usage)

             **Transport detection:**
             - URLs starting with `git@` or `ssh://` â†’ SSH
             - URLs starting with `https://` â†’ HTTPS

             If no repository exists yet (no `.git` directory or no remote), offer to create one using the provider's CLI, then re-detect.

          2. **Verify CLI authentication**
             - Use the provider's whoami or auth status command to confirm the current user is authenticated
             - If additional scopes are needed (e.g. GitHub's `project` scope), prompt for a refresh

          3. **Get default branch**
             - Query the provider's API or CLI for the repository's default branch name

          4. **Inventory existing labels**
             - List all labels on the repository with name, color, and description

          5. **Inventory milestones**
             - List all milestones with title, number, state, and issue counts

          6. **Inventory boards** (if the provider supports a board API)
             - List project boards with title, number, and URL
             - If the provider has no board API, record `boards_api: false`

          ## Output Format

          ### platform_context.md

          ```markdown
          # Platform Context

          ## Provider
          - **Provider**: [github | forgejo | gitea | gitlab]
          - **Host**: [hostname]
          - **Repository**: [owner/repo]
          - **Transport**: [ssh | https]
          - **Default Branch**: [main | master | etc.]
          - **Auth Status**: [authenticated as {username} | needs refresh]
          - **Boards API**: [true | false]

          ## Existing Labels

          | Name | Color | Description |
          |------|-------|-------------|
          | ... | ... | ... |

          ## Milestones

          | Title | Number | State | Open | Closed |
          |-------|--------|-------|------|--------|
          | ... | ... | ... | ... | ... |

          ## Boards

          | Title | Number | URL |
          |-------|--------|-----|
          | ... | ... | ... |

          [Or "N/A â€” provider does not support project boards via API"]
          ```
        inputs:
          project_repo:
            required: false
        outputs:
          platform_context.md: {}

      - name: ensure_labels
        instructions: |
          # Ensure Labels

          ## Objective

          Verify that the three required labels (`product`, `engineering`, `plan`) exist on the repository. Create any that are missing.

          ## Task

          ### Process

          1. **Read existing labels** from `platform_context.md`

          2. **Check for required labels**
             - Required: `product`, `engineering`, `plan`
             - Match case-insensitively against existing labels
             - If an exact-case match exists, mark as present
             - If a case-insensitive match exists but with wrong casing, note the discrepancy

          3. **Create missing labels**
             - Use the provider's label creation CLI or API
             - Recommended colors and descriptions:
               - `product` â€” color `#7057ff`, description "Product/UX scope"
               - `engineering` â€” color `#0075ca`, description "Technical scope"
               - `plan` â€” color `#e4e669`, description "Planning/coordination"

          4. **Verify creation**
             - Re-list labels to confirm the new labels exist

          ## Output Format

          ### labels_report.md

          ```markdown
          # Labels Report

          ## Summary
          - **Required Labels**: 3
          - **Already Present**: [count]
          - **Created**: [count]
          - **Case Mismatches**: [count]

          ## Details

          | Label | Status | Notes |
          |-------|--------|-------|
          | product | [present | created | case mismatch] | [details] |
          | engineering | [present | created | case mismatch] | [details] |
          | plan | [present | created | case mismatch] | [details] |
          ```
        inputs:
          platform_context.md: {}
        outputs:
          labels_report.md: {}

      - name: check_branch_protection
        instructions: |
          # Check Branch Protection

          ## Objective

          Check branch protection rules on the repository's default branch and report any missing or insufficient protections.

          ## Task

          ### Process

          1. **Read platform context** from `platform_context.md`
             - Get the default branch name and provider

          2. **Fetch branch protection rules**
             - Use the provider's API or CLI to retrieve current protection settings on the default branch
             - If no protection rules are configured, note that the branch is unprotected

          3. **Check for expected protections**

             Expected protections:
             - **Require PR reviews**: At least 1 approval required before merge
             - **Dismiss stale reviews**: Approvals dismissed when new commits are pushed
             - **Require status checks**: CI must pass before merge (if CI is configured)
             - **Restrict force pushes**: Force pushes to default branch are blocked
             - **Restrict deletions**: Default branch cannot be deleted

          4. **Report findings**
             - For each expected protection, note whether it is enabled or missing
             - Do NOT attempt to modify protections in the setup workflow â€” only report

          ## Output Format

          ### branch_protection_report.md

          ```markdown
          # Branch Protection Report

          ## Repository
          - **Repo**: [owner/repo]
          - **Default Branch**: [branch name]
          - **Provider**: [github | forgejo | etc.]

          ## Protection Status

          | Protection | Status | Details |
          |------------|--------|---------|
          | Require PR reviews | [enabled | missing] | [min approvals or N/A] |
          | Dismiss stale reviews | [enabled | missing] | |
          | Require status checks | [enabled | missing | N/A (no CI)] | [required checks] |
          | Restrict force pushes | [enabled | missing] | |
          | Restrict deletions | [enabled | missing] | |

          ## Summary
          - **Protections Enabled**: [count]/5
          - **Missing Protections**: [list]
          - **Overall**: [protected | partially protected | unprotected]
          ```
        inputs:
          platform_context.md: {}
        outputs:
          branch_protection_report.md: {}

      - name: check_milestones
        instructions: |
          # Check Milestones

          ## Objective

          Verify milestone-issue consistency: each milestone's issues are properly labeled, states are correct, and milestone metadata is complete.

          ## Task

          ### Process

          1. **Read milestones** from `platform_context.md`

          2. **For each open milestone, verify:**

             a. **Issues exist** â€” milestone has at least one issue
                - Use the provider's CLI or API to list all issues for the milestone

             b. **Consolidated issue exists** â€” look for an issue whose title matches the milestone title
                (this is the "tracking issue" pattern where a parent issue tracks the milestone's work)
                - Flag if missing, but do not create it (just report)

             c. **Labels are correct** â€” each issue should have at least one of the required labels
                (`product`, `engineering`, or `plan`)
                - Flag issues missing all three labels

             d. **State consistency** â€” if all issues are closed, the milestone should be closeable
                - Flag milestones where all issues are closed but milestone is still open

          3. **Compile findings per milestone**

          ## Output Format

          ### milestones_report.md

          ```markdown
          # Milestones Report

          ## Summary
          - **Total Open Milestones**: [count]
          - **Milestones with Issues**: [count]
          - **Empty Milestones**: [count]
          - **Issues Missing Labels**: [count]

          ## Milestones

          ### [Milestone Title] (#[number])
          - **Open Issues**: [count]
          - **Closed Issues**: [count]
          - **Consolidated Issue**: [found (#N) | missing]
          - **Unlabeled Issues**: [count]
            - #[N] â€” [title]
          - **State Issues**: [none | "all issues closed but milestone open"]
          ```
        inputs:
          platform_context.md: {}
        outputs:
          milestones_report.md: {}

      - name: check_boards
        instructions: |
          # Check Boards

          ## Objective

          Verify that each milestone has a corresponding project board and that item counts match the milestone's issue count.

          ## Task

          ### Process

          1. **Handle providers without a board API**
             - If `boards_api: false` in `platform_context.md`, output manual instructions:
               - Board URL pattern: `https://{host}/{owner}/{repo}/projects`
               - Steps to create a board manually in the web UI
               - Skip all CLI automation steps below

          2. **For each open milestone:**

             a. **Check for corresponding board**
                - Match board title against milestone title (from `platform_context.md` boards inventory)

             b. **If board exists, verify item count**
                - Use the provider's CLI or API to count board items
                - Compare board item count against milestone issue count (from `milestones_report.md`)
                - Flag mismatches

             c. **If no board exists**
                - Flag as missing
                - Do NOT create it in the setup workflow â€” only report

          3. **Check board columns** (for existing boards)
             - Verify the five standard columns exist: Backlog, To Do, In Progress, In Review, Done

          ## Output Format

          ### boards_report.md

          ```markdown
          # Boards Report

          ## Provider
          - **Provider**: [github | forgejo | etc.]
          - **Boards API**: [true | false]

          ## Summary
          - **Milestones Checked**: [count]
          - **Boards Found**: [count]
          - **Boards Missing**: [count]
          - **Item Count Mismatches**: [count]

          ## Milestones

          ### [Milestone Title]
          - **Board**: [found (#{number}) | missing]
          - **Board URL**: [url | N/A]
          - **Milestone Issues**: [count]
          - **Board Items**: [count | N/A]
          - **Match**: [yes | no â€” [details] | N/A]
          - **Columns OK**: [yes | no â€” missing: [list] | N/A]

          ## Manual Instructions (if no board API)

          [Step-by-step web UI instructions for creating and managing boards, or "N/A â€” using CLI"]
          ```
        inputs:
          platform_context.md: {}
          milestones_report.md: {}
        outputs:
          boards_report.md: {}

      - name: setup_report
        instructions: |
          # Setup Report

          ## Objective

          Compile a pass/fail readiness report across all four concerns: labels, branch protection, milestones, and boards.

          ## Task

          ### Process

          1. **Read all input reports**
             - `platform_context.md` â€” provider and repo info
             - `labels_report.md` â€” label status
             - `branch_protection_report.md` â€” protection status
             - `milestones_report.md` â€” milestone consistency
             - `boards_report.md` â€” board existence and item counts

          2. **Determine pass/fail for each concern**

             **Labels**: PASS if all three required labels exist. FAIL if any are missing after setup.

             **Branch Protection**: PASS if all expected protections are enabled. WARN if partially protected. FAIL if unprotected.

             **Milestones**: PASS if all milestones have issues, consolidated issues, and proper labels. WARN if minor issues found. FAIL if milestones are empty or severely inconsistent.

             **Boards**: PASS if every milestone has a board with matching item counts. WARN if minor mismatches. FAIL if boards are missing. N/A if provider lacks board API.

          3. **Compile overall readiness**
             - READY: all concerns pass
             - NEEDS ATTENTION: one or more concerns have warnings
             - NOT READY: one or more concerns fail

          ## Output Format

          ### setup_report.md

          ```markdown
          # Repo Setup Report

          ## Repository
          - **Repo**: [owner/repo]
          - **Provider**: [github | forgejo | etc.]
          - **Default Branch**: [branch]
          - **Date**: [YYYY-MM-DD]

          ## Readiness: [READY | NEEDS ATTENTION | NOT READY]

          ## Concerns

          | Concern | Status | Details |
          |---------|--------|---------|
          | Labels | [PASS | FAIL] | [summary] |
          | Branch Protection | [PASS | WARN | FAIL] | [summary] |
          | Milestones | [PASS | WARN | FAIL] | [summary] |
          | Boards | [PASS | WARN | FAIL | N/A] | [summary] |

          ## Details

          ### Labels
          [Key findings from labels_report.md]

          ### Branch Protection
          [Key findings from branch_protection_report.md]

          ### Milestones
          [Key findings from milestones_report.md]

          ### Boards
          [Key findings from boards_report.md]

          ## Recommended Actions
          - [Numbered list of next steps to reach READY status, or "None â€” repo is ready for work"]
          ```
        inputs:
          platform_context.md: {}
          labels_report.md: {}
          branch_protection_report.md: {}
          milestones_report.md: {}
          boards_report.md: {}
        outputs:
          setup_report.md: {}

  doctor:
    summary: "Audit existing repo state and fix drift across all conventions"
    common_job_info_provided_to_all_steps_at_runtime: |
