      - name: audit_labels
        instructions: |
          # Audit Labels

          ## Objective

          Deep audit of repository labels: verify required labels, find case-insensitive duplicates, identify zero-issue labels, and fix issues.

          ## Task

          ### Process

          1. **Read existing labels** from `platform_context.md`

          2. **Check required labels**
             - Required: `product`, `engineering`, `plan`
             - Create any that are missing (same as ensure_labels)

          3. **Find case-insensitive duplicates**
             - Group all labels by lowercased name
             - Flag any groups with more than one label (e.g., `Bug` and `bug`)
             - Recommend which to keep (prefer lowercase)

          4. **Find zero-issue labels**
             - For each label, count issues using it via the provider's CLI or API
             - Labels with zero issues are flagged as candidates for cleanup
             - Do NOT auto-delete â€” just flag them

          5. **Fix case mismatches on required labels**
             - If a required label exists with wrong casing, rename it using the provider's label edit command

          ## Output Format

          ### labels_audit.md

          ```markdown
          # Labels Audit

          ## Summary
          - **Total Labels**: [count]
          - **Required Labels OK**: [count]/3
          - **Created**: [count]
          - **Case Duplicates Found**: [count]
          - **Zero-Issue Labels**: [count]

          ## Required Labels

          | Label | Status | Action |
          |-------|--------|--------|
          | product | [ok | created | renamed] | [details] |
          | engineering | [ok | created | renamed] | [details] |
          | plan | [ok | created | renamed] | [details] |

          ## Case-Insensitive Duplicates

          | Lowercase Name | Variants | Recommendation |
          |----------------|----------|----------------|
          | ... | Bug, bug | Keep "bug", delete "Bug" |

          ## Zero-Issue Labels

          | Label | Created | Recommendation |
          |-------|---------|----------------|
          | ... | [date] | Consider removing |

          ## Actions Taken
          - [List of changes made]

          ## Manual Actions Needed
          - [List of changes requiring human intervention, or "None"]
          ```
        inputs:
          platform_context.md: {}
        outputs:
          labels_audit.md: {}

      - name: audit_branch_protection
        instructions: |
          # Audit Branch Protection

          ## Objective

          Deep check of branch protection rules on the default branch. Attempt to enable missing protections via the provider's API.

          ## Task

          ### Process

          1. **Read platform context** from `platform_context.md`

          2. **Fetch current branch protection**
             - Use the provider's API or CLI to retrieve protection settings on the default branch

          3. **Check all expected protections**

             Same checklist as check_branch_protection:
             - Require PR reviews (min 1 approval)
             - Dismiss stale reviews
             - Require status checks (if CI configured)
             - Restrict force pushes
             - Restrict deletions

          4. **Attempt to enable missing protections**
             - Use the provider's API to enable missing protections
             - Be careful with APIs that replace the entire protection config â€” read existing settings first and merge
             - Document any API errors or permission issues

          5. **Verify changes**
             - Re-fetch protection rules to confirm the changes took effect
             - Document any API errors or permission issues

          ## Output Format

          ### branch_protection_audit.md

          ```markdown
          # Branch Protection Audit

          ## Repository
          - **Repo**: [owner/repo]
          - **Default Branch**: [branch name]
          - **Provider**: [github | forgejo | etc.]

          ## Findings

          | Protection | Before | After | Action |
          |------------|--------|-------|--------|
          | Require PR reviews | [enabled | missing] | [enabled | missing] | [enabled via API | already set | failed: reason] |
          | Dismiss stale reviews | ... | ... | ... |
          | Require status checks | ... | ... | ... |
          | Restrict force pushes | ... | ... | ... |
          | Restrict deletions | ... | ... | ... |

          ## Actions Taken
          - [List of API calls made and their results]

          ## Remaining Gaps
          - [Protections that could not be enabled, with reasons]
          - [Or "None â€” all protections are in place"]
          ```
        inputs:
          platform_context.md: {}
        outputs:
          branch_protection_audit.md: {}

      - name: audit_milestones
        instructions: |
          # Audit Milestones

          ## Objective

          Deep consistency check on milestones. Fix label drift on issues â€” add missing labels, correct mismatches.

          ## Task

          ### Process

          1. **Read platform context** from `platform_context.md`

          2. **For each open milestone:**

             a. **List all issues**
                - Use the provider's CLI or API to list all issues for the milestone with their title, state, labels, and assignees

             b. **Check consolidated issue**
                - Look for an issue whose title matches the milestone title
                - If missing, flag but do not create

             c. **Audit labels on each issue**
                - Every issue SHOULD have at least one of: `product`, `engineering`, `plan`
                - Apply heuristic to add missing labels:
                  - Issues with specs, user stories, or UX mentions â†’ `product`
                  - Issues with implementation, code, or technical mentions â†’ `engineering`
                  - Issues about planning, coordination, or tracking â†’ `plan`
                - Fix label drift using the provider's issue edit command

             d. **Check assignees**
                - Flag issues with no assignees
                - Do NOT auto-assign â€” just report

             e. **State consistency**
                - If all issues are closed, flag the milestone for closure
                - If milestone has a due date in the past and open issues remain, flag as overdue

          3. **Compile audit findings and actions taken**

          ## Output Format

          ### milestones_audit.md

          ```markdown
          # Milestones Audit

          ## Summary
          - **Milestones Audited**: [count]
          - **Issues Audited**: [count]
          - **Labels Added**: [count]
          - **Unassigned Issues**: [count]
          - **Overdue Milestones**: [count]

          ## Milestones

          ### [Milestone Title] (#[number])

          **Issues:**

          | # | Title | State | Labels | Assignees | Action |
          |---|-------|-------|--------|-----------|--------|
          | ... | ... | ... | ... | ... | [added "engineering" label | ok] |

          **Findings:**
          - Consolidated issue: [found (#N) | missing]
          - Unassigned issues: [list or "none"]
          - State: [ok | all closed â€” recommend closing milestone | overdue]

          ## Actions Taken
          - [List of label additions and other fixes]

          ## Manual Actions Needed
          - [Milestones to close, issues to assign, etc.]
          ```
        inputs:
          platform_context.md: {}
        outputs:
          milestones_audit.md: {}

      - name: audit_boards
        instructions: |
          # Audit Boards

          ## Objective

          Full board audit: add missing items, correct wrong statuses, flag stale cards. For providers without a board API, output manual instructions.

          ## Task

          ### Process

          1. **Handle providers without a board API**
             - If `boards_api: false` in `platform_context.md`, output manual review instructions:
               - How to check boards in the web UI at `https://{host}/{owner}/{repo}/projects`
               - Checklist of things to verify manually
               - Skip all CLI automation steps below

          2. **For each open milestone with a board:**

             a. **Fetch board items**
                - Use the provider's CLI or API to list all items on the board

             b. **Fetch milestone issues**
                - Use the provider's CLI or API to list all issues in the milestone

             c. **Find missing items** â€” milestone issues not on the board
                - Add missing items using the provider's board item add command

             d. **Cross-reference statuses** â€” for each board item:
                - Check linked issue state and PR state
                - Expected status rules (check in this order, first match wins):
                  - Closed issue â†’ Done
                  - Open + non-draft PR with reviewers requested â†’ In Review
                  - Open + any PR (draft or non-draft without reviewers) â†’ In Progress
                  - Open + no PR â†’ Backlog
                - Correct wrong statuses using the provider's board item edit command

             e. **Find stale cards** â€” board items whose linked issue is NOT in the milestone
                - Flag but do NOT auto-remove

          3. **For milestones without boards:**
             - Flag as missing
             - Optionally create if there are issues to track (ask user or just report)

          ## Output Format

          ### boards_audit.md

          ```markdown
          # Boards Audit

          ## Provider
          - **Provider**: [github | forgejo | etc.]
          - **Boards API**: [true | false]

          ## Summary
          - **Boards Audited**: [count]
          - **Items Added**: [count]
          - **Statuses Corrected**: [count]
          - **Stale Cards Flagged**: [count]
          - **Missing Boards**: [count]

          ## Per-Board Details

          ### [Milestone Title] â€” Board #{number}

          **Items Added:**

          | Issue # | Item ID | Status Set | Reason |
          |---------|---------|------------|--------|
          | ... | ... | ... | ... |

          **Statuses Corrected:**

          | Issue # | Item ID | Old Status | New Status | Reason |
          |---------|---------|------------|------------|--------|
          | ... | ... | ... | ... | ... |

          **Stale Cards:**

          | Item ID | Linked Issue | Recommendation |
          |---------|-------------|----------------|
          | ... | ... | ... |

          ## Missing Boards
          - [Milestone Title] â€” [count] issues, no board

          ## Manual Instructions (if no board API)
          [Manual review checklist, or "N/A"]

          ## Actions Taken
          - [Summary of all automated fixes]

          ## Remaining Issues
          - [Items needing manual attention]
          ```
        inputs:
          platform_context.md: {}
          milestones_audit.md: {}
        outputs:
          boards_audit.md: {}

      - name: doctor_report
        instructions: |
          # Doctor Report

          ## Objective

          Compile a summary of all audit findings, fixes applied, and remaining issues across all four concerns.

          ## Task

          ### Process

          1. **Read all input reports**
             - `platform_context.md` â€” provider and repo info
             - `labels_audit.md` â€” label audit findings and fixes
             - `branch_protection_audit.md` â€” protection audit and fixes
             - `milestones_audit.md` â€” milestone audit and label drift fixes
             - `boards_audit.md` â€” board audit and status corrections

          2. **Summarize findings per concern**
             - Count total findings, fixes applied, and remaining issues

          3. **Determine health status for each concern**
             - HEALTHY: no issues found (nothing to fix)
             - FIXED: issues were found and all were automatically fixed
             - NEEDS ATTENTION: issues remain that require manual intervention

          4. **Compile remaining manual actions**
             - Aggregate all items from each audit that still need human attention

          ## Output Format

          ### doctor_report.md

          ```markdown
