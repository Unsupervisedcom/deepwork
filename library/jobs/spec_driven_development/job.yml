# yaml-language-server: $schema=.deepwork/schemas/job.schema.json
name: spec_driven_development
version: "1.1.0"
summary: "Spec-driven development workflow that turns specifications into working implementations through structured planning."
common_job_info_provided_to_all_steps_at_runtime: |
  A comprehensive workflow inspired by GitHub's spec-kit that enables "spec-driven development" -
  a methodology where executable specifications generate working implementations rather than
  merely guiding them.

  This job inverts traditional development: instead of starting with code, you first create
  detailed specifications that directly generate implementations. The workflow progresses through
  six phases: Constitution, Specification, Clarification, Planning, Task Generation, and Implementation.

  The workflow produces all artifacts in a `specs/[feature-name]/` directory structure,
  keeping specifications versioned alongside the implementation they generate.

  Ideal for:
  - New feature development requiring upfront design
  - Complex features with multiple stakeholders
  - Projects where specification quality directly impacts implementation success
  - Teams wanting to capture design decisions for future reference

workflows:
  - name: spec_driven_development
    summary: "Run the complete spec-driven development workflow from constitution through implementation"
    steps:
      - constitution
      - specify
      - clarify
      - plan
      - tasks
      - implement

steps:
  - id: constitution
    name: "Establish Constitution"
    hidden: true
    description: "Creates foundational governance principles and development guidelines for the project. Use when starting a new project or establishing standards."
    instructions_file: steps/constitution.md
    inputs:
      - name: development_priorities
        description: "Key priorities like code quality, testing, UX consistency, performance"
    outputs:
      constitution.md:
        type: file
        description: "Foundational governance principles and development guidelines"
        required: true
    dependencies: []
    reviews:
      - run_each: constitution.md
        quality_criteria:
          "Priorities Captured": "Specific development priorities are captured from the user."
          "Principles Defined": "Governance principles are clear and actionable."
          "Technology Guidance": "The constitution includes relevant technology stack preferences."
          "Quality Standards": "Quality standards and testing expectations are defined."
          "File Created": "constitution.md has been created in the project's documentation folder."

  - id: specify
    name: "Create Specification"
    hidden: true
    description: "Defines functional requirements as user stories without technology choices. Use when starting to design a new feature."
    instructions_file: steps/specify.md
    inputs:
      - name: feature_name
        description: "Name of the feature being specified (lowercase, hyphens for spaces)"
      - name: feature_description
        description: "High-level description of what the feature should do"
      - file: constitution.md
        from_step: constitution
    outputs:
      spec.md:
        type: file
        description: "Functional requirements as user stories without technology choices"
        required: true
    dependencies:
      - constitution
    reviews:
      - run_each: spec.md
        quality_criteria:
          "User Stories Complete": "All user stories are written in standard format (As a... I want... So that...)."
          "Acceptance Criteria": "Each story has clear, testable acceptance criteria."
          "Non-Functional Requirements": "Performance, security, and accessibility requirements are captured."
          "Scope Boundaries": "Scope boundaries are clearly defined."
          "Constitution Aligned": "The spec respects the governance principles from the constitution."
          "Technology Agnostic": "The spec is free of implementation details and technology choices."
          "File Created": "spec.md has been created in specs/[feature-name]/."

  - id: clarify
    name: "Clarify Specification"
    hidden: true
    description: "Resolves ambiguities and gaps in the specification through structured questioning. Use after specification to ensure completeness."
    instructions_file: steps/clarify.md
    inputs:
      - file: spec.md
        from_step: specify
    outputs:
      spec.md:
        type: file
        description: "Updated specification with clarifications and resolved ambiguities"
        required: true
    dependencies:
      - specify
    reviews:
      - run_each: spec.md
        quality_criteria:
          "Ambiguities Identified": "Underspecified areas are systematically identified."
          "Questions Asked": "Structured questions are asked to resolve each ambiguity."
          "Answers Documented": "Clarification answers are recorded in the spec document."
          "Edge Cases Covered": "Edge cases and error scenarios are defined."
          "Acceptance Checklist": "The acceptance criteria checklist is complete and validated."
          "Spec Updated": "spec.md has been updated with all clarifications."

  - id: plan
    name: "Generate Technical Plan"
    hidden: true
    description: "Creates technical implementation strategy including architecture and technology choices. Use after specification is clarified."
    instructions_file: steps/plan.md
    inputs:
      - file: spec.md
        from_step: clarify
      - file: constitution.md
        from_step: constitution
      - name: architecture_doc_path
        description: "Path to existing project architecture document (if present, otherwise leave blank)"
    outputs:
      plan.md:
        type: file
        description: "Technical implementation strategy including architecture and technology choices"
        required: true
      data-model.md:
        type: file
        description: "Data model documentation with all entities and relationships"
        required: true
      api-spec.json:
        type: file
        description: "API endpoint definitions with request/response schemas"
        required: true
      research.md:
        type: file
        description: "Research findings and technology evaluations"
        required: true
      architecture.md:
        type: file
        description: "Updated project architecture document"
        required: true
    dependencies:
      - constitution
      - clarify
    reviews:
      - run_each: step
        quality_criteria:
          "Architecture Defined": "The high-level architecture is clearly described."
          "Technology Justified": "Technology choices are explained with rationale."
          "Data Model Complete": "The data model is documented with all entities and relationships."
          "API Contracts": "API endpoints are defined with request/response schemas."
          "Research Documented": "Research findings and technology evaluations are captured."
          "Dependencies Listed": "External dependencies and their versions are specified."
          "Constitution Respected": "The plan aligns with governance principles."
          "Architecture Doc Updated": "The project architecture document has been reviewed and updated if needed."
          "Files Created": "All output files have been created in specs/[feature-name]/."

  - id: tasks
    name: "Generate Task Breakdown"
    hidden: true
    description: "Converts the implementation plan into actionable, ordered development tasks. Use after plan is validated."
    instructions_file: steps/tasks.md
    inputs:
      - file: plan.md
        from_step: plan
      - file: spec.md
        from_step: clarify
      - file: architecture.md
        from_step: plan
    outputs:
      tasks.md:
        type: file
        description: "Actionable, ordered development tasks organized by user story"
        required: true
    dependencies:
      - clarify
      - plan
    reviews:
      - run_each: tasks.md
        quality_criteria:
          "User Story Organization": "Tasks are organized by user story."
          "Dependencies Sequenced": "Task dependencies are correctly ordered."
          "Parallel Tasks Marked": "Parallelizable tasks are identified with [P] markers."
          "File Paths Specified": "Each task specifies which files it creates/modifies."
          "TDD Structure": "Test tasks are included before or alongside implementation tasks."
          "Checkpoints Defined": "Validation checkpoints are included between phases."
          "Granularity Appropriate": "Tasks are small enough to be completed in one session."
          "File Created": "tasks.md has been created in specs/[feature-name]/."

  - id: implement
    name: "Execute Implementation"
    hidden: true
    description: "Generates code and assets by executing the task breakdown. Use when ready to build the feature."
    instructions_file: steps/implement.md
    inputs:
      - file: tasks.md
        from_step: tasks
      - file: plan.md
        from_step: plan
      - file: spec.md
        from_step: clarify
      - file: architecture.md
        from_step: plan
    outputs:
      source_files:
        type: files
        description: "Implementation source files as specified in tasks"
        required: true
      test_files:
        type: files
        description: "Test files as specified in tasks"
        required: true
    dependencies:
      - clarify
      - plan
      - tasks
    reviews:
      - run_each: step
        quality_criteria:
          "Prerequisites Met": "All spec/plan/tasks artifacts were validated before starting."
          "Task Order Followed": "Tasks were executed in dependency order."
          "Tests Written": "Tests are created alongside or before implementation."
          "Acceptance Criteria Met": "The implementation satisfies all acceptance criteria from spec."
          "Code Quality": "The code meets the standards defined in the constitution."
          "Progress Tracked": "Progress was communicated throughout implementation."
          "All Tasks Complete": "All tasks in tasks.md have been completed."
