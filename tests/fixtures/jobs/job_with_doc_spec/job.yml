name: job_with_doc_spec
summary: "Job with typed output for testing"

step_arguments:
  - name: report_title
    description: "Title for the report"
    type: string
  - name: report
    description: "Generated report document"
    type: file_path

workflows:
  main:
    summary: "Generate a report"
    common_job_info_provided_to_all_steps_at_runtime: |
      Reports should always include citations.
    steps:
      - name: generate_report
        instructions: |
          Generate a report with the given title.
        inputs:
          report_title:
            required: true
        outputs:
          report:
            required: true
